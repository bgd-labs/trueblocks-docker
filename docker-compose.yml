services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: trueblocks-api
    depends_on:
      trueblocks:
        condition: service_healthy
    expose:
      - "3000"
    restart: unless-stopped
    volumes:
      - type: volume
        source: cache
        target: /cache
        read_only: true
      - type: volume
        source: unchained
        target: /unchained
        read_only: true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  trueblocks:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UPSTREAM_VER: develop
    container_name: trueblocks-core
    volumes:
      - type: volume
        source: cache
        target: /cache
      - type: volume
        source: unchained
        target: /unchained
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 5s
      timeout: 5s
      retries: 60

volumes:
  cache:
  unchained:
